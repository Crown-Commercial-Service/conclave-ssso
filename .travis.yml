dist: xenial
addons:
  snaps:
  - name: dotnet-sdk
    confinement: classic
    channel: latest/beta
sudo: required
language: csharp
dotnet: 6.0.1
solution: ./api/CcsSso.sln
install:
  - dotnet restore ./api/CcsSso.sln
mono: none
script:
  - dotnet build --configuration Release ./api/CcsSso.sln --os linux-x64
  - pwd
  - ls -l api/CcsSso.Core.ExternalApi/bin/Release/net6.0/
deploy:
  - provider: cloudfoundry
    username: $username
    password: $password
    api: $api
    organization: $organisation
    space: $TRAVIS_BRANCH
    manifest: /home/travis/build/Crown-Commercial-Service/conclave-ssso/manifest.yml
    skip-cleanup: true
    edge: true
    on:
      branch: $TRAVIS_BRANCH
before_deploy:
- sh app.sh
