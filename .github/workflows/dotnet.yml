name: .NET

on:
  push:
    branches: [ sandbox-cicd ]
  pull_request:
    branches: [ sandbox-cicd ]

jobs:
  build-api-wrapper:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: 5.0.x
    - name: Restore dependencies
      run: dotnet restore ./api/CcsSso.sln
    - name: Build artifacts
      run: dotnet build --configuration Debug ./api/CcsSso.sln
    - name: Upload and Publish jFrog artifactory 
      uses: jfrog/setup-jfrog-cli@v2
      env:
        JF_ENV_1: ${{ secrets.JF_SECRET_ENV_1 }}
    - run: jfrog rt ping 
    - run: jfrog rt upload api/CcsSso.Core.ExternalApi/bin/Debug/net5.0/ ccs-nuget --flat=false --build-name=api-wrapper --build-number=release-commit-${GITHUB_SHA::7}  
    - run: jfrog rt build-publish api-wrapper release-commit-${GITHUB_SHA::7} 
    - run: jfrog rt upload api/CcsSso.Core.Api/bin/Release/net5.0/ ccs-nuget --flat=false --build-name=api-core --build-number=release-commit-${GITHUB_SHA::7}  
    - run: jfrog rt build-publish api-core release-commit-${GITHUB_SHA::7} 
    - run: jfrog rt upload api/CcsSso.Adaptor.Api/bin/Release/net5.0/ ccs-nuget --flat=false --build-name=api-adaptor --build-number=release-commit-${GITHUB_SHA::7}  
    - run: jfrog rt build-publish api-adaptor release-commit-${GITHUB_SHA::7} 
    - run: jfrog rt upload api/CcsSso.Adaptor.SqsListener/bin/Release/net5.0/ ccs-nuget --flat=false --build-name=adaptor-sqs-listener --build-number=release-commit-${GITHUB_SHA::7}  
    - run: jfrog rt build-publish adaptor-sqs-listener release-commit-${GITHUB_SHA::7} 
    - run: jfrog rt upload api/CcsSso.Security.Api/bin/Debug/net5.0/ ccs-nuget --flat=false --build-name=api-security --build-number=release-commit-${GITHUB_SHA::7}  
    - run: jfrog rt build-publish api-security release-commit-${GITHUB_SHA::7} 
    - run: jfrog rt upload api/CcsSso.Core.JobScheduler/bin/Debug/net5.0/ ccs-nuget --flat=false --build-name=org-dereg-job --build-number=release-commit-${GITHUB_SHA::7}  
    - run: jfrog rt build-publish org-dereg-job release-commit-${GITHUB_SHA::7} 

  deploy_staging:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Download api-wrapper artifactory from jFrog
      uses: jfrog/setup-jfrog-cli@v2
      env:
        JF_ENV_1: ${{ secrets.JF_SECRET_ENV_1 }}
    - run: jfrog rt ping 
    - run: jfrog rt download --build=api-wrapper/release-commit-${GITHUB_SHA::7} ccs-nuget    
    - name: Publish api-wrapper to Sandbox CloudFoundry
      uses: brickendon/cloudfoundry@main
      with:
        api:      ${{ secrets.CF_API }}
        org:      ${{ secrets.CF_ORG }}
        username: ${{ secrets.CF_USERNAME }}
        password: ${{ secrets.CF_PASSWORD }}
        space:    sandbox
        manifest: /home/runner/work/conclave-ssso/conclave-ssso/cf_scripts/sandbox/manifest.api.external.yml
        validate: true          # set to false if you don't want to validate ssl
    - name: Download api-core artifactory from jFrog
      uses: jfrog/setup-jfrog-cli@v2
      env:
        JF_ENV_1: ${{ secrets.JF_SECRET_ENV_1 }}
    - run: jfrog rt ping 
    - run: jfrog rt download --build=api-core/release-commit-${GITHUB_SHA::7} ccs-nuget    
    - name: Publish api-core to Sandbox CloudFoundry
      uses: brickendon/cloudfoundry@main
      with:
        api:      ${{ secrets.CF_API }}
        org:      ${{ secrets.CF_ORG }}
        username: ${{ secrets.CF_USERNAME }}
        password: ${{ secrets.CF_PASSWORD }}
        space:    sandbox
        manifest: /home/runner/work/conclave-ssso/conclave-ssso/cf_scripts/sandbox/manifest.api.core.yml
        validate: true          # set to false if you don't want to validate ssl
    - name: Download api-security artifactory from jFrog
      uses: jfrog/setup-jfrog-cli@v2
      env:
        JF_ENV_1: ${{ secrets.JF_SECRET_ENV_1 }}
    - run: jfrog rt ping 
    - run: jfrog rt download --build=api-security/release-commit-${GITHUB_SHA::7} ccs-nuget    
    - name: Publish api-security to Sandbox CloudFoundry
      uses: brickendon/cloudfoundry@main
      with:
        api:      ${{ secrets.CF_API }}
        org:      ${{ secrets.CF_ORG }}
        username: ${{ secrets.CF_USERNAME }}
        password: ${{ secrets.CF_PASSWORD }}
        space:    sandbox
        manifest: /home/runner/work/conclave-ssso/conclave-ssso/cf_scripts/sandbox/manifest.api.security.yml
        validate: true          # set to false if you don't want to validate ssl
