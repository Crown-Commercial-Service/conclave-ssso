name: .NET

on:
  push:
    branches: [ sandbox-cicd ]
  pull_request:
    branches: [ sandbox-cicd ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: 5.0.x
    - name: Restore dependencies
      run: dotnet restore ./api/CcsSso.sln
    - name: Build
      run: dotnet build --configuration Release ./api/CcsSso.sln
    - name: Get jFrog artifactory ready
      uses: jfrog/setup-jfrog-cli@v2
      env:
        JF_ENV_1: ${{ secrets.JF_SECRET_ENV_1 }}
    - run: jfrog rt ping 
    - run: jfrog rt upload api/CcsSso.Core.ExternalApi/bin/Release/net5.0/ ccs-nuget --flat=false --build-name=api-wrapper --build-number=release-commit-${GITHUB_SHA::7}  
    - run: jfrog rt build-publish api-wrapper release-commit-${GITHUB_SHA::7} 

  deploy_staging:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Get artifactory from jFrog
      uses: jfrog/setup-jfrog-cli@v2
      env:
        JF_ENV_1: ${{ secrets.JF_SECRET_ENV_1 }}
    - run: jfrog rt ping 
    - run: jfrog rt download --build=api-wrapper/release-commit-${GITHUB_SHA::7} ccs-nuget    
    - name: Publish to CloudFoundry
      uses: brickendon/cloudfoundry@main
      with:
        api:      ${{ secrets.CF_API }}
        org:      ${{ secrets.CF_ORG }}
        username: ${{ secrets.CF_USERNAME }}
        password: ${{ secrets.CF_PASSWORD }}
        space:    sandbox
        manifest: ./cf_scripts/sandbox/manifest.api.external.yml
        validate: true          # set to false if you don't want to validate ssl
